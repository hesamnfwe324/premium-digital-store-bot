services:
  - type: web
    name: premium-digital-store-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: premium-store-db
          property: connectionString
      - key: WEBHOOK_ENABLED
        value: "true"
      - key: WEBHOOK_HOST
        sync: false
      - key: WEBHOOK_PATH
        value: "/webhook"
      - key: ADMIN_IDS
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: USDT_TRC20_ADDRESS
        sync: false
      - key: USDT_BEP20_ADDRESS
        sync: false
      - key: BTC_ADDRESS
        sync: false
      - key: ETH_ADDRESS
        sync: false
      - key: BNB_ADDRESS
        sync: false
      - key: TON_ADDRESS
        sync: false
      - key: SUPPORT_USERNAME
        sync: false
      - key: APP_NAME
        value: "Premium Digital Store"
      - key: LOG_LEVEL
        value: "INFO"
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: "3.12.0"

databases:
  - name: premium-store-db
    databaseName: premiumstore
    plan: free
    user: premiumstore
